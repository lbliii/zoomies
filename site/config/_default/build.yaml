# Build Configuration
# ===================

build:
  output_dir: "public"
  incremental: true

assets:
  minify: true
  fingerprint: true

html_output:
  mode: "pretty"
  remove_comments: true
  collapse_blank_lines: true

health_check:
  enabled: true
  verbose: false

health:
  linkcheck:
    exclude_domain:
      - "localhost"
      - "127.0.0.1"
    ignore_status:
      - "403"
